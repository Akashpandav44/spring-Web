spring.application.name=api-gateway

server:
  port: 9090

spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      routes:

        - id: student-service
          uri: lb://STUDENT-SERVICE
          predicates:
            - Path=/students/**

        - id: hostel-service
          uri: lb://HOSTEL-SERVICE
          predicates:
            - Path=/hostels/**

        - id: room-service
          uri: lb://ROOM-SERVICE
          predicates:
            - Path=/rooms/**

        - id: allocation-service
          uri: lb://ALLOCATION-SERVICE
          predicates:
            - Path=/allocations/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
